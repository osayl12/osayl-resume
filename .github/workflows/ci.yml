name: CI/CD - osayl-resume

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Install Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: npm install

    # 4️⃣ Build React app
    - name: Build React app
      run: npm run build

    # 5️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t osayl-resume .

    # 6️⃣ Login to Docker Hub
    - name: Docker Hub Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7️⃣ Push Docker image
    - name: Push Docker image
      run: |
        docker tag osayl-resume ${{ secrets.DOCKER_USERNAME }}/osayl-resume:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/osayl-resume:latest

    # 8️⃣ Deploy to Oracle Cloud via SSH
    - name: Deploy to Oracle Cloud VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/osayl-resume:latest
          docker stop resume || true
          docker rm resume || true
          docker run -d -p 80:80 --name resume ${{ secrets.DOCKER_USERNAME }}/osayl-resume:latest
