name: CI - osayl-resume

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Build Docker image
      run: docker build -t osayl-resume .

    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker image
      run: |
        docker tag osayl-resume ${{ secrets.DOCKER_USERNAME }}/osayl-resume
        docker push ${{ secrets.DOCKER_USERNAME }}/osayl-resume
